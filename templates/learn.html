<!DOCTYPE html>
<html>
<head>
  <title>Learn - Zone {{ zone_num }}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-4">
  <p class="text-muted">Zone {{ zone_num }} of {{ num_zones }}</p>
  <h1>Zone {{ zone.number }} — {{ zone.name }}</h1>
  <p>{{ zone.street_range }}</p>

  {% for n in zone.neighborhoods %}
  <div class="card mb-3">
    <div class="card-body">
      <h5 class="card-title">{{ n.name }}</h5>
      <p class="card-text">{{ n.fact }}</p>
    </div>
  </div>
  {% endfor %}

  <div class="mt-3">
    {% if zone_num == 1 %}
      <a href="/" class="btn btn-secondary">Back</a>
    {% else %}
      <a href="/learn/{{ zone_num - 1 }}" class="btn btn-secondary">Back</a>
    {% endif %}

    {% if is_last %}
      <a href="/quiz/1" class="btn btn-primary">Start Quiz</a>
    {% else %}
      <a href="/learn/{{ zone_num + 1 }}" class="btn btn-primary">Next</a>
    {% endif %}
  </div>
</body>
</html>
