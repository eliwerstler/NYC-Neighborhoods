<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Quiz - Question {{ q_num }}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-4">

  <p class="text-muted">Question {{ q_num }} of {{ num_questions }}</p>

  <div class="progress mb-4" style="height: 8px;">
    <div class="progress-bar" style="width: {{ (q_num / num_questions * 100) | int }}%;"></div>
  </div>

  <h2 class="mb-1">Which zone is this neighborhood in?</h2>
  <h1 class="mb-4 fw-bold">{{ question.neighborhood }}</h1>

  <form method="POST">
    {% for zone in zones %}
    <button type="submit" name="answer" value="{{ zone.number }}"
            class="btn btn-outline-secondary w-100 mb-2">
      Zone {{ zone.number }} — {{ zone.name }}
    </button>
    {% endfor %}
  </form>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
